<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmLuxora Permanent</title>
<style>
:root { --primary: #ff5722; --dark: #333; --light: #f4f4f4; --white: #fff; }
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { background-color: var(--light); padding-bottom: 50px; }
header { background-color: var(--primary); color: var(--white); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.2); flex-wrap: wrap; gap: 10px;}
.logo { font-size: 1.5rem; font-weight: bold; }
.search-container { flex-grow: 1; max-width: 400px; margin: 0 15px; }
.search-input { width: 100%; padding: 8px 15px; border-radius: 20px; border: none; outline: none; }
.cart-icon { font-size: 1.2rem; }
.hero { background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%); padding: 40px 20px; text-align: center; margin-bottom: 20px; }
.hero h1 { color: var(--dark); margin-bottom: 10px; }
.categories { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding: 0 10px; }
.cat-btn { background: var(--white); border: 1px solid #ddd; padding: 8px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap; transition: 0.3s; }
.cat-btn.active, .cat-btn:hover { background: var(--primary); color: var(--white); border-color: var(--primary); }
.container { max-width: 1200px; margin: 0 auto; padding: 0 15px; }
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
.product-card { background: var(--white); border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
.product-img { width: 100%; height: 180px; object-fit: cover; background-color: #eee; }
.product-info { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; }
.product-title { font-size: 0.9rem; margin-bottom: 5px; color: var(--dark); }
.product-price { font-weight: bold; color: var(--primary); font-size: 1.1rem; margin-bottom: 10px; }
.buy-btn { margin-top: auto; background: var(--primary); color: var(--white); border: none; padding: 8px; border-radius: 4px; cursor: pointer; width: 100%; }
.admin-trigger { text-align: center; margin-top: 50px; font-size: 2rem; color: #ccc; cursor: pointer; padding: 20px; }
.admin-trigger:hover { color: var(--primary); transform: scale(1.2); }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
.modal-content { background: var(--white); padding: 25px; border-radius: 8px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; position: relative; }
.close-btn { position: absolute; top: 10px; right: 15px; font-size: 1.5rem; cursor: pointer; }
input, select, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; }
.action-btn { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 10px; }
.delete-btn { background: red; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
.notification { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 10px 20px; border-radius: 5px; display: none; z-index: 2000; }
</style>
</head>
<body>
<header>
<div class="logo">OmLuxora</div>
<div class="search-container">
<input type="text" id="searchBar" class="search-input" placeholder="Search products..." onkeyup="searchProducts()">
</div>
<div class="cart-icon">🛒 Cart (0)</div>
</header>
<img src="abc.png" style="width:100%;border-radius:10px;">
<div class="hero"><h1>Welcome to OmLuxora</h1><p>Best Deals, Best Prices</p></div>
<div class="categories" id="categoryContainer">
<button class="cat-btn active" onclick="filterProducts('all')">All</button>
<button class="cat-btn" onclick="filterProducts('Electronics')">Electronics</button>
<button class="cat-btn" onclick="filterProducts('Fashion')">Fashion</button>
<button class="cat-btn" onclick="filterProducts('Mens')">Mens</button>
<button class="cat-btn" onclick="filterProducts('Shoes')">Shoes</button>
<button class="cat-btn" onclick="filterProducts('Womens')">Womens</button>
<button class="cat-btn" onclick="filterProducts('Jewellery')">Jewellery</button>
<button class="cat-btn" onclick="filterProducts('Home')">Home</button>
<button class="cat-btn" onclick="filterProducts('Beauty')">Beauty</button>
<button class="cat-btn" onclick="filterProducts('Sports')">Sports</button>
<button class="cat-btn" onclick="filterProducts('Toys')">Toys</button>
<button class="cat-btn" onclick="filterProducts('Books')">Books</button>
</div>
<div class="container">
<div class="product-grid" id="productGrid"></div>
</div>
<div class="admin-trigger" onclick="openAdminLogin()">ॐ</div>
<div class="notification" id="notification">Action Successful</div>

<!-- Admin Login -->
<div class="modal" id="loginModal">
<div class="modal-content">
<span class="close-btn" onclick="closeModal('loginModal')">&times;</span>
<h2>Admin Access</h2>
<input type="password" id="adminPassword" placeholder="Password">
<button class="action-btn" onclick="checkPassword()">Login</button>
</div>
</div>

<!-- Admin Panel -->
<div class="modal" id="adminPanelModal">
<div class="modal-content">
<span class="close-btn" onclick="closeModal('adminPanelModal')">&times;</span>
<h2>Admin Dashboard</h2>
<div style="display:flex;gap:10px;margin-bottom:15px;">
<button class="action-btn" style="flex:1;" onclick="showAdminTab('add')">Add Product</button>
<button class="action-btn" style="flex:1;" onclick="showAdminTab('orders')">Orders</button>
<button class="action-btn" style="flex:1;" onclick="showAdminTab('delete')">Delete Product</button>
</div>
<div id="addTab">
<input type="text" id="pName" placeholder="Product Name">
<input type="number" id="pPrice" placeholder="Price (₹)">
<input type="text" id="pImage" placeholder="Image URL">
<select id="pCategory">
<option value="Electronics">Electronics</option>
<option value="Fashion">Fashion</option>
<option value="Mens">Mens</option>
<option value="Shoes">Shoes</option>
<option value="Womens">Womens</option>
<option value="Jewellery">Jewellery</option>
<option value="Home">Home</option>
<option value="Beauty">Beauty</option>
<option value="Sports">Sports</option>
<option value="Toys">Toys</option>
<option value="Books">Books</option>
</select>
<button class="action-btn" onclick="addProduct()">Add Product</button>
</div>

<div id="deleteTab" style="display:none;">
<div id="deleteList" style="margin-top:10px;"></div>
</div>

<div id="ordersTab" style="display:none;">
<div id="ordersList" style="margin-top:10px;"></div>
</div>

</div>
</div>

<!-- Buy Modal -->
<div class="modal" id="buyModal">
<div class="modal-content">
<span class="close-btn" onclick="closeModal('buyModal')">&times;</span>
<p id="buyProductName" style="font-weight:bold;margin-bottom:10px;"></p>
<input type="text" id="custName" placeholder="Your Name">
<input type="text" id="custMobile" placeholder="Mobile Number">
<textarea id="custAddress" placeholder="Delivery Address"></textarea>
<button class="action-btn" onclick="placeOrder()">Confirm Order</button>
</div>
</div>

<!-- PARSE SDK -->
<script src="https://unpkg.com/parse/dist/parse.min.js"></script>
<script>
// ✅ Parse Init
Parse.initialize("2863mJqPkyc6TEj1q55nkv6hsXMcBDIri3pqhw2u", "wuBmIS393iffvQFsESP2qCaU1AKHz1CH10vgsj2b"); // App ID + JS Key
Parse.serverURL = "https://parseapi.back4app.com";

let products = [];
let currentCategory = 'all';

// 🔥 LOAD PRODUCTS
async function loadProducts() {
  const Product = Parse.Object.extend("Products");
  const query = new Parse.Query(Product);

  try {
    const results = await query.find();
    products = results.map(p => ({
      id: p.id,
      name: p.get("name"),
      price: p.get("price"),
      image: p.get("image"),
      category: p.get("category")
    }));
    renderProducts();
    renderDeleteList();
  } catch (err) {
    alert("Error: "+err.message);
  }
}

// 🔥  ADD PRODUCT (Admin Only) with ACL
async function addProduct() {
  let name = document.getElementById('pName').value;
  let price = Number(document.getElementById('pPrice').value);
  let image = document.getElementById('pImage').value;
  let category = document.getElementById('pCategory').value;

  if (!name || !price || !image) { alert("Fill all details"); return; }

  const Product = Parse.Object.extend("Products");
  const product = new Product();
  product.set("name", name);
  product.set("price", price);
  product.set("image", image);
  product.set("category", category);

  // ✅ ACL: Public read, write only admin
  let acl = new Parse.ACL();
  acl.setPublicReadAccess(true);
  product.setACL(acl);

  try {
    await product.save();
    showNotification("Product Added 🔥");
    loadProducts();
  } catch(err) {
    alert("Error: "+err.message);
  }
}

// 🔥 DELETE PRODUCT
async function deleteProduct(id) {
  if (!confirm('Delete this product?')) return;
  const Product = Parse.Object.extend("Products");
  const query = new Parse.Query(Product);

  try {
    const p = await query.get(id);
    await p.destroy();
    showNotification("Product Deleted!");
    loadProducts();
  } catch(err) {
    alert("Error: "+err.message);
  }
}

// 🔥 RENDER PRODUCTS
function renderProducts(filter=currentCategory, searchTerm=document.getElementById('searchBar').value) {
  let grid = document.getElementById('productGrid');
  grid.innerHTML = '';
  let filtered = filter==='all'?products:products.filter(p=>p.category===filter);
  if(searchTerm) filtered = filtered.filter(p=>p.name.toLowerCase().includes(searchTerm.toLowerCase()));
  if(filtered.length===0){grid.innerHTML='<p style="grid-column:1/-1;text-align:center;padding:20px;">No products found.</p>';return;}
  filtered.forEach(p=>{
    let card=document.createElement('div'); card.className='product-card';
    card.innerHTML=`
      <img src="${p.image}" class="product-img">
      <div class="product-info">
        <div class="product-title">${p.name}</div>
        <div class="product-price">₹${p.price}</div>
        <button class="buy-btn" onclick="openBuyModal('${p.id}')">Buy Now</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

// FILTER & SEARCH
function filterProducts(category){currentCategory=category;document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');renderProducts();}
function searchProducts(){renderProducts();}

// ADMIN LOGIN
function openAdminLogin(){document.getElementById('loginModal').style.display='flex';}
function checkPassword(){
  if(document.getElementById('adminPassword').value==='sitaram'){
    closeModal('loginModal');
    document.getElementById('adminPanelModal').style.display='flex';
    showAdminTab('add');
  } else alert('Wrong Password');
}
function showAdminTab(tab){
  document.getElementById('addTab').style.display='none';
  document.getElementById('deleteTab').style.display='none';
  document.getElementById('ordersTab').style.display='none';
  if(tab==='add') document.getElementById('addTab').style.display='block';
  else if(tab==='delete'){document.getElementById('deleteTab').style.display='block';renderDeleteList();}
}
function closeModal(id){document.getElementById(id).style.display='none';}

// DELETE LIST
function renderDeleteList(){
  let list=document.getElementById('deleteList'); list.innerHTML='';
  products.forEach(p=>{
    let div=document.createElement('div');
    div.innerHTML=`
      <div style="display:flex;justify-content:space-between;">
        <div>${p.name} - ₹${p.price}</div>
        <button class="delete-btn" onclick="deleteProduct('${p.id}')">Delete</button>
      </div>
    `;
    list.appendChild(div);
  });
}

// BUY
function openBuyModal(id){
  const p=products.find(x=>x.id==id);
  document.getElementById('buyProductName').innerText=p.name;
  document.getElementById('buyModal').setAttribute('data-product-id',id);
  document.getElementById('buyModal').style.display='flex';
}
function placeOrder(){ alert("Order Placed (demo)"); closeModal('buyModal'); }

// NOTIFICATION
function showNotification(msg){
  const n=document.getElementById('notification'); n.innerText=msg; n.style.display='block';
  setTimeout(()=>{n.style.display='none';},3000);
}

// INIT
loadProducts();
</script>
</body>
</html>
