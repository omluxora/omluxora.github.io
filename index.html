<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmLuxora</title>

<style>

:root{
--primary:#ff5722;
--dark:#333;
--light:#f4f4f4;
--white:#fff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
}

body{
background:var(--light);
padding-bottom:50px;
}

header{
background:var(--primary);
color:#fff;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:1.5rem;
font-weight:bold;
}

.search-container{
flex-grow:1;
max-width:400px;
margin:0 15px;
}

.search-input{
width:100%;
padding:8px 15px;
border-radius:20px;
border:none;
outline:none;
}

.cart-icon{
font-size:1.2rem;
}

.banner{
max-width:1200px;
margin:20px auto;
padding:0 15px;
}

.banner img{
width:100%;
border-radius:20px;
}

.hero{
background:linear-gradient(45deg,#ff9a9e,#fad0c4);
padding:40px 20px;
text-align:center;
margin-bottom:20px;
}

.categories{
display:flex;
gap:10px;
overflow-x:auto;
justify-content:center;
padding:0 10px;
margin-bottom:20px;
}

.cat-btn{
background:#fff;
border:1px solid #ddd;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
}

.cat-btn.active,
.cat-btn:hover{
background:var(--primary);
color:#fff;
}

.container{
max-width:1200px;
margin:auto;
padding:0 15px;
}

.product-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:15px;
}

.product-card{
background:#fff;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
display:flex;
flex-direction:column;
}

.product-img{
width:100%;
height:180px;
object-fit:cover;
background:#eee;
}

.product-info{
padding:10px;
display:flex;
flex-direction:column;
flex-grow:1;
}

.product-title{
font-size:.9rem;
margin-bottom:5px;
}

.product-price{
font-weight:bold;
color:var(--primary);
margin-bottom:10px;
}

.buy-btn{
margin-top:auto;
background:var(--primary);
color:#fff;
border:none;
padding:8px;
border-radius:4px;
cursor:pointer;
}

.admin-trigger{
text-align:center;
font-size:2rem;
color:#ccc;
margin-top:50px;
cursor:pointer;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-content{
background:#fff;
padding:25px;
border-radius:8px;
width:90%;
max-width:500px;
}

.close-btn{
float:right;
cursor:pointer;
font-size:1.4rem;
}

input,select,textarea{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ddd;
border-radius:4px;
}

.action-btn{
background:var(--primary);
color:#fff;
border:none;
padding:10px;
border-radius:4px;
cursor:pointer;
width:100%;
}

.notification{
position:fixed;
bottom:20px;
right:20px;
background:#333;
color:#fff;
padding:10px 20px;
border-radius:5px;
display:none;
}

</style>
</head>

<body>

<header>

<div class="logo">OmLuxora</div>

<div class="search-container">
<input type="text" id="searchBar" class="search-input"
placeholder="Search products..." onkeyup="searchProducts()">
</div>

<div class="cart-icon">🛒</div>

</header>

<div class="banner">
<img src="abc.png">
</div>

<div class="hero">
<h1>Welcome to OmLuxora</h1>
<p>Best Deals, Best Prices</p>
</div>

<div class="categories">

<button class="cat-btn active"
onclick="filterProducts('all')">All</button>

<button class="cat-btn"
onclick="filterProducts('Electronics')">Electronics</button>

<button class="cat-btn"
onclick="filterProducts('Fashion')">Fashion</button>

<button class="cat-btn"
onclick="filterProducts('Home')">Home</button>

<button class="cat-btn"
onclick="filterProducts('Beauty')">Beauty</button>

</div>

<div class="container">
<div class="product-grid" id="productGrid"></div>
</div>

<div class="admin-trigger" onclick="openAdmin()">ॐ</div>

<div class="modal" id="adminModal">
<div class="modal-content">

<span class="close-btn"
onclick="closeModal()">×</span>

<h3>Add Product</h3>

<input id="pName" placeholder="Product name">
<input id="pPrice" placeholder="Price">

<input id="pImage"
placeholder="Image URL">

<select id="pCategory">

<option>Electronics</option>
<option>Fashion</option>
<option>Home</option>
<option>Beauty</option>

</select>

<button class="action-btn"
onclick="addProduct()">Add Product</button>

</div>
</div>

<div class="notification" id="notification">
Done
</div>

<script>

let products=[
{
id:1,
name:"Wireless Headphones",
price:999,
category:"Electronics",
image:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e"
},

{
id:2,
name:"Running Shoes",
price:1499,
category:"Fashion",
image:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"
},

{
id:3,
name:"Smart Watch",
price:2499,
category:"Electronics",
image:"https://images.unsplash.com/photo-1523275335684-37898b6baf30"
}

]

let currentCategory="all"

function renderProducts(){

let grid=document.getElementById("productGrid")

grid.innerHTML=""

let filtered=products

if(currentCategory!=="all")
filtered=products.filter(p=>p.category===currentCategory)

filtered.forEach(product=>{

let card=document.createElement("div")

card.className="product-card"

card.innerHTML=`

<img src="${product.image}"
class="product-img">

<div class="product-info">

<div class="product-title">
${product.name}
</div>

<div class="product-price">
₹${product.price}
</div>

<button class="buy-btn">
Buy Now
</button>

</div>
`

grid.appendChild(card)

})

}

function filterProducts(cat){

currentCategory=cat

document
.querySelectorAll(".cat-btn")
.forEach(btn=>btn.classList.remove("active"))

event.target.classList.add("active")

renderProducts()

}

function searchProducts(){

let term=document
.getElementById("searchBar")
.value
.toLowerCase()

let grid=document
.getElementById("productGrid")

grid.innerHTML=""

products
.filter(p=>p.name
.toLowerCase()
.includes(term))
.forEach(product=>{

let card=document
.createElement("div")

card.className="product-card"

card.innerHTML=`

<img src="${product.image}"
class="product-img">

<div class="product-info">

<div class="product-title">
${product.name}
</div>

<div class="product-price">
₹${product.price}
</div>

<button class="buy-btn">
Buy Now
</button>

</div>
`

grid.appendChild(card)

})

}

function openAdmin(){

document
.getElementById("adminModal")
.style.display="flex"

}

function closeModal(){

document
.getElementById("adminModal")
.style.display="none"

}

function addProduct(){

let name=document
.getElementById("pName").value

let price=document
.getElementById("pPrice").value

let image=document
.getElementById("pImage").value

let category=document
.getElementById("pCategory").value

products.push({

id:Date.now(),
name:name,
price:price,
category:category,
image:image

})

renderProducts()

closeModal()

showNotification("Product Added")

}

function showNotification(text){

let n=document
.getElementById("notification")

n.innerText=text

n.style.display="block"

setTimeout(()=>{

n.style.display="none"

},2000)

}

renderProducts()

</script>

</body>
</html>
